
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Distância</title>
</head>
<body>
  <h2>Calcular distância até a loja</h2>
  <input type="text" id="endereco" placeholder="Digite seu endereço" />
  <button onclick="calcular()">Calcular</button>
  <p id="resultado"></p>

 
<script>
async function calcular() {
    const endereco = document.getElementById("endereco").value.trim();
    const resultado = document.getElementById("resultado");

    if (!endereco) {
        resultado.innerText = "Digite um endereço.";
        return;
    }

    resultado.innerText = "Calculando...";

    try {
        const resposta = await fetch("/calcular", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ endereco })
        });

        const dados = await resposta.json();

        if (resposta.ok) {
            resultado.innerText =
                `Distância: ${dados.distancia} | Tempo estimado: ${dados.duracao}`;
        } else {
            resultado.innerText =
                dados.erro || "Não foi possível calcular.";
        }

    } catch (erro) {
        resultado.innerText =
            "Erro ao conectar com o servidor.";
    }
}
</script>
